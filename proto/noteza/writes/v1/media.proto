syntax = "proto3";

package noteza.writes.v1;

option go_package = "github.com/noteza-cloud/noteza-writes-proto/gen/go/noteza/writes/v1;writesv1";

import "google/protobuf/timestamp.proto";

enum ImageStatus {
  IMAGE_STATUS_UNSPECIFIED = 0;
  IMAGE_STATUS_PENDING = 1;
  IMAGE_STATUS_READY = 2;
  IMAGE_STATUS_FAILED = 3;
  IMAGE_STATUS_DELETED = 4;
}

message ImageGallery {
  repeated ImagePreview images = 1;
}

message ImagePreview {
  string id = 1;
  string url = 2;
  optional string alt_text = 3;
}

message ImageAsset {
  string id = 1;
  string user_id = 2;
  string url = 3;
  string mime_type = 4;
  int64 size_bytes = 5;
  int32 width = 6;
  int32 height = 7;
  ImageStatus status = 8;
  optional string alt_text = 9;
  google.protobuf.Timestamp created_at = 10;
}
