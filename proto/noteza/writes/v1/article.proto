syntax = "proto3";

package noteza.writes.v1;

option go_package = "github.com/noteza-cloud/noteza-writes-proto/gen/go/noteza/writes/v1;writesv1";

import "google/protobuf/timestamp.proto";
import "noteza/writes/v1/media.proto";

enum ArticleStatus {
  ARTICLE_STATUS_UNSPECIFIED = 0;
  ARTICLE_STATUS_DRAFT = 1;
  ARTICLE_STATUS_PUBLISHED = 2;
  ARTICLE_STATUS_ARCHIVED = 3;
}

message ArticlePreview {
  string id = 1;
  int32 version = 2;
  optional ImagePreview cover_image = 3;
  string title = 4;
  string content_preview = 5;
}

message Article {
  string id = 1;
  string user_id = 2;
  optional string series_id = 3;
  int32 version = 4;
  optional ImagePreview cover_image = 5;
  repeated ImagePreview images = 6;
  string title = 7;
  string content_md = 8;
  ArticleStatus status = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  optional google.protobuf.Timestamp published_at = 12;
}
