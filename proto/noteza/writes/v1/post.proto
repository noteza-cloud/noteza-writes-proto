syntax = "proto3";

package noteza.writes.v1;

option go_package = "github.com/noteza-cloud/noteza-writes-proto/gen/go/noteza/writes/v1;writesv1";

import "google/protobuf/timestamp.proto";
import "noteza/writes/v1/media.proto";
import "noteza/writes/v1/article.proto";

enum PostStatus {
  POST_STATUS_UNSPECIFIED = 0;
  POST_STATUS_DRAFT = 1;
  POST_STATUS_PUBLISHED = 2;
  POST_STATUS_ARCHIVED = 3;
}

message Post {
  string id = 1;
  string user_id = 2;
  optional string series_id = 3;
  int32 version = 4;
  string content = 5;
  PostStatus status = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  optional google.protobuf.Timestamp published_at = 9;
  oneof body {
    ArticlePreview article = 10;
    ImageGallery images = 11;
  }
}
